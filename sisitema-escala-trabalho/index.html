<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="principal">

        <h1>
            <button class="botao-esquerda">
                <ion-icon name="arrow-back-outline"></ion-icon>
            </button>

            Calendário
        
            <button class="botao-direita">
                <ion-icon name="arrow-forward-outline"></ion-icon>
            </button>
        </h1>

        <div class="meses">
            <span></span>
        </div>

        <div class="dias-semana">
            <span>Segunda</span>
            <span>Terça</span>
            <span>Quarta</span>
            <span>Quinta</span>
            <span>Sexta</span>
            <span>Sábado</span>
            <span>Domingo</span>
        </div>

        <div class="numeros-semana">
            <span class="mes-anterior">30</span>
            <span class="mes-anterior">31</span>
        </div>

        <div class="container">

            <div class="painel">
                <input class="titulo" type="text" placeholder="Digite sua tarefa">

            <!-- <textarea class="descriçao"
                    placeholder="Descrição">
                </textarea>-->

                <button class="salvar">Salvar</button>
            </div>

        </div>  

        
    
    </div>

   <!-- <a href="tarefa.html">clique aqui</a>-->
    

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"> 
    </script>

    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js">
    </script>

    <script src="script.js"></script>
</body>
</html>
